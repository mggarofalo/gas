services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: gastracker
      POSTGRES_USER: gas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gas -d gastracker"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=gastracker;Username=gas;Password=${DB_PASSWORD:-changeme}
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      MinIO__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      MinIO__BucketName: gas-receipts
      MinIO__UseSSL: "false"
      AllowedOrigins: http://localhost:5173
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
