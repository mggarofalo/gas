name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Build & Check (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/GasTracker/GasTracker.slnx

      - name: Build
        run: dotnet build src/GasTracker/GasTracker.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/GasTracker/GasTracker.Tests/GasTracker.Tests.csproj -c Release --no-build

  frontend:
    name: Build & Check (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend
