name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Build & Check (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/GasTracker/GasTracker.slnx

      - name: Build
        run: dotnet build src/GasTracker/GasTracker.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/GasTracker.Tests/GasTracker.Tests.csproj -c Release --no-build --collect:"XPlat Code Coverage"

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:coverage/backend -reporttypes:HtmlSummary

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend

  frontend:
    name: Build & Check (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: src/frontend

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend
